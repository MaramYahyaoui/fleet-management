name: CI Backend
on:
  push:
    branches: [main, develop]
    paths: ['backend/**']
  pull_request:
    branches: [main]
    paths: ['backend/**']
jobs:
  build-test-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        working-directory: backend
        run: mvn clean package -DskipTests

      - name: Run tests
        working-directory: backend
        run: mvn test

      - name: SonarCloud Analysis
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        working-directory: backend
        run: |
          mvn sonar:sonar \
            -Dsonar.projectKey=MaramYahyaoui_fleet-management \
            -Dsonar.organization=maramyahyaoui \
            -Dsonar.host.url=https://sonarcloud.io \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }}

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fleet-backend:${{ github.sha }} ./backend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fleet-backend:latest ./backend

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/fleet-backend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fleet-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/fleet-backend:latest
