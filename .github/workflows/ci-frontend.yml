name: CI Frontend

on:
  push:
    branches: [main, develop]
    paths: ['frontend/**']
  pull_request:
    branches: [main]
    paths: ['frontend/**']

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint
        working-directory: frontend
        run: npm run lint -- --max-warnings=0

      - name: Build Angular
        working-directory: frontend
        run: npm run build -- --configuration production

      # ✅ Login AVANT build et scan
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fleet-frontend:${{ github.sha }} ./frontend
          docker build -t ${{ secrets.DOCKER_USERNAME }}/fleet-frontend:latest ./frontend

      # ✅ Scan APRÈS login et build
      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: '${{ secrets.DOCKER_USERNAME }}/fleet-frontend:latest'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL'

      - name: Push Docker image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/fleet-frontend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/fleet-frontend:latest
