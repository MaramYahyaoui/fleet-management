<div class="fade-in">
  <div class="page-header">
    <div class="page-title">
      <h1>Véhicules</h1>
      <p>{{ filtered.length }} véhicule(s) trouvé(s)</p>
    </div>
    <button class="btn btn--primary" routerLink="/vehicules/nouveau">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau véhicule
    </button>
  </div>

  <div class="filter-row">
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Immatriculation, modèle…"
             [(ngModel)]="search" (ngModelChange)="applyFilters()">
    </div>
    <select class="form-control" style="width:180px"
            [(ngModel)]="selectedStatut" (ngModelChange)="applyFilters()">
      <option value="">Tous les statuts</option>
      <option value="DISPONIBLE">Disponible</option>
      <option value="EN_MISSION">En mission</option>
      <option value="EN_MAINTENANCE">Maintenance</option>
      <option value="EN_PANNE">En panne</option>
    </select>
    <button class="btn btn--secondary btn--sm" (click)="load()">Actualiser</button>
  </div>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div class="card" *ngIf="!loading">
    <div class="table-wrapper" style="border:none">
      <table>
        <thead>
          <tr>
            <th>Immatriculation</th>
            <th>Modèle</th>
            <th>Type</th>
            <th>Kilométrage</th>
            <th>Statut</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let v of filtered">
            <td>
              <a [routerLink]="['/vehicules', v.id]" class="immat-link mono">{{ v.immatriculation }}</a>
            </td>
            <td>{{ v.modele }}</td>
            <td><span class="chip">{{ v.type }}</span></td>
            <td class="mono">{{ v.kilometrage | number }} km</td>
            <td><app-status-badge [status]="v.statut"></app-status-badge></td>
            <td>
              <div class="action-cell">
                <button class="btn btn--icon" title="Voir" [routerLink]="['/vehicules', v.id]">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                </button>
                <button class="btn btn--icon" title="Modifier" [routerLink]="['/vehicules', v.id, 'modifier']">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn btn--icon" title="Supprimer" (click)="delete(v)">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="filtered.length === 0">
            <td colspan="6">
              <div class="empty-state">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="1" y="3" width="15" height="13" rx="2"/><path d="M16 8h4l3 5v3h-7V8z"/><circle cx="5.5" cy="18.5" r="2.5"/><circle cx="18.5" cy="18.5" r="2.5"/></svg>
                <p>Aucun véhicule trouvé</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<app-confirm-dialog></app-confirm-dialog>
