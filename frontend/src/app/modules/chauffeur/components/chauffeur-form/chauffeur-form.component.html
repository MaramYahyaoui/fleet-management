<div class="fade-in">
  <div class="page-header">
    <div class="page-title">
      <h1>{{ isEdit ? 'Modifier le chauffeur' : 'Nouveau chauffeur' }}</h1>
    </div>
    <button class="btn btn--secondary" (click)="cancel()">Annuler</button>
  </div>
  <app-loading-spinner *ngIf="loading"></app-loading-spinner>
  <div class="card" style="max-width:520px" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-group">
        <label class="form-label">Nom complet *</label>
        <input class="form-control" formControlName="nom" placeholder="ex: Mohamed Ben Ali">
        <span class="form-error" *ngIf="f['nom'].touched && f['nom'].errors?.['required']">Champ obligatoire</span>
      </div>
      <div class="form-group">
        <label class="form-label">Numéro de permis *</label>
        <input class="form-control" formControlName="permis" placeholder="ex: B-12345" style="font-family:var(--font-mono)">
        <span class="form-error" *ngIf="f['permis'].touched && f['permis'].errors?.['required']">Champ obligatoire</span>
      </div>
      <div class="form-group">
        <label class="form-label">Expérience (années) *</label>
        <input class="form-control" type="number" formControlName="experience" min="0" max="60" style="font-family:var(--font-mono)">
        <span class="form-error" *ngIf="f['experience'].touched && f['experience'].errors?.['min']">Valeur invalide</span>
      </div>
      <div class="form-actions">
        <button type="button" class="btn btn--secondary" (click)="cancel()">Annuler</button>
        <button type="submit" class="btn btn--primary" [disabled]="saving">
          {{ saving ? 'Enregistrement…' : (isEdit ? 'Mettre à jour' : 'Créer') }}
        </button>
      </div>
    </form>
  </div>
</div>
