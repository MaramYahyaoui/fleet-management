<div class="fade-in">
  <div class="page-header">
    <div class="page-title">
      <h1>Chauffeurs</h1>
      <p>{{ filtered.length }} chauffeur(s)</p>
    </div>
    <button class="btn btn--primary" routerLink="/chauffeurs/nouveau">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      Nouveau chauffeur
    </button>
  </div>

  <div class="filter-row">
    <div class="search-bar">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" placeholder="Nom, permis…" [(ngModel)]="search" (ngModelChange)="applyFilters()">
    </div>
    <button class="btn btn--secondary btn--sm" (click)="load()">Actualiser</button>
  </div>

  <app-loading-spinner *ngIf="loading"></app-loading-spinner>

  <div class="card" *ngIf="!loading">
    <div class="table-wrapper" style="border:none">
      <table>
        <thead>
          <tr>
            <th>Nom</th><th>N° Permis</th><th>Expérience</th><th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of filtered">
            <td>
              <div class="chauffeur-cell">
                <div class="avatar">{{ c.nom.charAt(0) }}</div>
                <span>{{ c.nom }}</span>
              </div>
            </td>
            <td class="mono">{{ c.permis }}</td>
            <td>
              <span class="exp-badge">{{ c.experience }} ans</span>
            </td>
            <td>
              <div class="action-cell">
                <button class="btn btn--icon" [routerLink]="['/chauffeurs', c.id, 'modifier']" title="Modifier">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                </button>
                <button class="btn btn--icon" (click)="delete(c)" title="Supprimer">
                  <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/></svg>
                </button>
              </div>
            </td>
          </tr>
          <tr *ngIf="filtered.length===0">
            <td colspan="4">
              <div class="empty-state">
                <svg width="36" height="36" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <p>Aucun chauffeur trouvé</p>
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
<app-confirm-dialog></app-confirm-dialog>
