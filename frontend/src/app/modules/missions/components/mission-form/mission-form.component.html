<div class="fade-in">
  <div class="page-header">
    <div class="page-title">
      <h1>{{ isEdit ? 'Modifier la mission' : 'Nouvelle mission' }}</h1>
      <p>Affecter un véhicule et un chauffeur</p>
    </div>
    <button class="btn btn--secondary" (click)="cancel()">Annuler</button>
  </div>
  <app-loading-spinner *ngIf="loading"></app-loading-spinner>
  <div class="card" style="max-width:640px" *ngIf="!loading">
    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-grid">
        <div class="form-group">
          <label class="form-label">Véhicule *</label>
          <select class="form-control" formControlName="vehiculeId">
            <option [ngValue]="null">Sélectionner un véhicule</option>
            <option *ngFor="let v of vehicules" [ngValue]="v.id">
              {{ v.immatriculation }} — {{ v.modele }}
            </option>
          </select>
          <span class="form-error" *ngIf="f['vehiculeId'].touched && f['vehiculeId'].errors?.['required']">Champ obligatoire</span>
        </div>

        <div class="form-group">
          <label class="form-label">Chauffeur *</label>
          <select class="form-control" formControlName="chauffeurId">
            <option [ngValue]="null">Sélectionner un chauffeur</option>
            <option *ngFor="let c of chauffeurs" [ngValue]="c.id">{{ c.nom }}</option>
          </select>
          <span class="form-error" *ngIf="f['chauffeurId'].touched && f['chauffeurId'].errors?.['required']">Champ obligatoire</span>
        </div>

        <div class="form-group">
          <label class="form-label">Point de départ *</label>
          <input class="form-control" formControlName="pointDepart" placeholder="ex: Tunis">
          <span class="form-error" *ngIf="f['pointDepart'].touched && f['pointDepart'].errors?.['required']">Champ obligatoire</span>
        </div>

        <div class="form-group">
          <label class="form-label">Destination *</label>
          <input class="form-control" formControlName="destination" placeholder="ex: Sfax">
          <span class="form-error" *ngIf="f['destination'].touched && f['destination'].errors?.['required']">Champ obligatoire</span>
        </div>

        <div class="form-group">
          <label class="form-label">Distance estimée (km) *</label>
          <input class="form-control" type="number" formControlName="distance"
                 placeholder="0" style="font-family:var(--font-mono)">
          <span class="form-error" *ngIf="f['distance'].touched && f['distance'].errors?.['min']">Valeur invalide</span>
        </div>

        <div class="form-group">
          <label class="form-label">Date de mission</label>
          <input class="form-control" type="date" formControlName="dateMission"
                 style="font-family:var(--font-mono)">
        </div>
      </div>

      <div class="form-actions">
        <button type="button" class="btn btn--secondary" (click)="cancel()">Annuler</button>
        <button type="submit" class="btn btn--primary" [disabled]="saving">
          {{ saving ? 'Enregistrement…' : (isEdit ? 'Mettre à jour' : 'Démarrer la mission') }}
        </button>
      </div>
    </form>
  </div>
</div>
